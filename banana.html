<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Banana Quest: Four Worlds</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101723;
      font-family: Inter, Arial, sans-serif;
      touch-action: none;
    }

    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    canvas {
      display: block;
      width: min(100vw, calc(100vh * 1.6666667));
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 5 / 3;
      background: #8ed6ff;
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: 0 20px 70px rgba(0,0,0,.45);
    }

    #controls {
      position: fixed;
      inset: auto 0 18px 0;
      display: none;
      justify-content: space-between;
      padding: 0 18px;
      pointer-events: none;
      z-index: 5;
    }

    .group {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    button {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 3px solid rgba(15,23,42,.95);
      background: rgba(255,255,255,.8);
      color: #111827;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    button:active {
      transform: scale(.95);
      background: #fde68a;
    }

    @media (hover: none), (pointer: coarse) {
      #controls { display: flex; }
    }

    @media (max-height: 520px) {
      #controls { bottom: 8px; padding: 0 10px; }
      button { width: 52px; height: 52px; font-size: 22px; }
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1000" height="600"></canvas>

  <div id="controls">
    <div class="group">
      <button data-key="ArrowLeft" aria-label="Move left">◀</button>
      <button data-key="ArrowRight" aria-label="Move right">▶</button>
    </div>
    <div class="group">
      <button data-key="Space" aria-label="Jump">⤴</button>
      <button data-key="Enter" aria-label="Start or continue">▶</button>
    </div>
  </div>
</div>

<script>
  (() => {
    "use strict";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    const keys = {};
    const gravity = 0.58;
    const friction = 0.78;

    let state = "title";
    let currentLevel = 1;
    let unlockedLevel = 1;
    let lives = 3;
    let transitionTicks = 0;
    let messageTicks = 0;
    let particles = [];
    let frame = 0;

    const player = {
      x: 70, y: 430, w: 34, h: 62,
      vx: 0, vy: 0,
      speed: 3.45,
      jump: 13.2,
      onGround: false,
      hasBanana: false,
      facing: 1,
      invulnerable: 0
    };

    let platforms = [];
    let enemies = [];
    let hazards = [];
    let movers = [];
    let decor = [];
    let banana = null;
    let friend = null;
    let boss = null;

    const levels = {
      1: {
        name: "Tutorial Forest",
        icon: "🍌",
        theme: "forest",
        start: { x: 55, y: 450 },
        banana: { x: 780, y: 198 },
        friend: { x: 905, y: 470 },
        platforms: [
          [0,550,220,50],[255,490,150,28],[455,425,155,28],[655,350,150,28],[785,255,160,28],
          [515,220,130,26],[305,310,120,26]
        ],
        enemies: [
          [285,455,"slime",1.0],[505,390,"thief",1.15],[700,315,"slime",1.1]
        ],
        decor: [
          [80,495,"tree"],[360,440,"bush"],[865,205,"tree"],[585,165,"flower"]
        ]
      },

      2: {
        name: "Jungle",
        icon: "🌴",
        theme: "jungle",
        start: { x: 45, y: 455 },
        banana: { x: 870, y: 95 },
        friend: { x: 75, y: 210 },
        platforms: [
          [0,550,180,50],[220,485,135,28],[390,415,135,28],[560,345,135,28],[735,275,135,28],
          [835,155,150,28],[615,205,110,25],[405,255,110,25],[180,320,125,25],[35,275,130,25]
        ],
        movers: [
          {x:310,y:520,w:90,h:18,axis:"x",range:95,speed:1.0,base:310},
          {x:720,y:455,w:90,h:18,axis:"y",range:80,speed:0.8,base:455}
        ],
        enemies: [
          [235,450,"monkey",1.15],[420,380,"snake",1.0],[595,310,"thief",1.35],[770,240,"bird",1.25]
        ],
        hazards: [
          {x:500,y:530,w:55,h:20,type:"water"}
        ],
        decor: [
          [120,495,"palm"],[485,355,"vine"],[905,105,"palm"],[650,155,"waterfall"]
        ]
      },

      3: {
        name: "Mountain",
        icon: "🏔️",
        theme: "mountain",
        start: { x: 45, y: 455 },
        banana: { x: 865, y: 120 },
        friend: { x: 80, y: 185 },
        slippery: true,
        wind: true,
        platforms: [
          [0,550,165,50],[205,495,125,26],[375,445,120,26],[540,390,120,26],[700,330,115,26],
          [845,255,140,26],[745,175,130,24],[560,230,110,24],[380,280,115,24],[190,235,125,24],[40,250,130,24]
        ],
        movers: [
          {x:275,y:360,w:85,h:16,axis:"y",range:72,speed:0.75,base:360}
        ],
        enemies: [
          [220,460,"goat",1.2],[400,410,"ice",1.0],[565,355,"eagle",1.25],[725,295,"yeti",1.15]
        ],
        hazards: [
          {x:330,y:536,w:45,h:14,type:"spikes"},
          {x:660,y:536,w:55,h:14,type:"spikes"}
        ],
        decor: [
          [90,495,"pine"],[455,390,"snow"],[900,205,"pine"],[630,180,"snow"]
        ]
      },

      4: {
        name: "Volcano",
        icon: "🌋",
        theme: "volcano",
        start: { x: 45, y: 455 },
        banana: { x: 835, y: 95 },
        friend: { x: 70, y: 205 },
        lavaRise: true,
        platforms: [
          [0,550,155,50],[200,500,120,25],[365,450,120,25],[530,395,115,25],[690,335,115,25],
          [835,270,150,25],[790,155,155,25],[610,215,120,24],[430,270,120,24],[245,315,120,24],[45,270,125,24]
        ],
        movers: [
          {x:150,y:420,w:80,h:16,axis:"x",range:70,speed:1.25,base:150},
          {x:650,y:485,w:80,h:16,axis:"y",range:70,speed:0.95,base:485}
        ],
        enemies: [
          [215,465,"fire",1.2],[390,415,"bat",1.35],[555,360,"magma",1.15],[715,300,"fire",1.25],[855,235,"golem",1.0]
        ],
        hazards: [
          {x:155,y:535,w:45,h:25,type:"lava"},
          {x:320,y:535,w:45,h:25,type:"lava"},
          {x:485,y:535,w:45,h:25,type:"lava"},
          {x:805,y:535,w:30,h:25,type:"lava"}
        ],
        decor: [
          [100,500,"rock"],[450,400,"ember"],[900,215,"rock"],[620,165,"ember"]
        ]
      }
    };

    function loadLevel(n) {
      const data = levels[n];
      currentLevel = n;
      player.x = data.start.x;
      player.y = data.start.y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.hasBanana = false;
      player.invulnerable = 40;

      platforms = data.platforms.map(([x,y,w,h]) => ({x,y,w,h}));
      movers = (data.movers || []).map(m => ({...m, t:0}));
      hazards = (data.hazards || []).map(h => ({...h}));
      decor = (data.decor || []).map(([x,y,type]) => ({x,y,type}));

      banana = {x:data.banana.x,y:data.banana.y,w:40,h:40,collected:false,bob:0};
      friend = {x:data.friend.x,y:data.friend.y,w:36,h:64};
      boss = null;

      enemies = data.enemies.map(([x,y,type,speed], i) => ({
        x,y,w:36,h:36,type,speed,dir:i%2? -1:1,alive:true,phase:i*0.8,chaseSpeed:speed+0.85
      }));

      particles = [];
      clearKeys();
    }

    function startGame() {
      lives = 3;
      unlockedLevel = Math.max(unlockedLevel, 1);
      loadLevel(1);
      state = "playing";
    }

    function restartCurrentLevel() {
      loadLevel(currentLevel);
      state = "playing";
    }

    function completeLevel() {
      if (currentLevel < 4) {
        unlockedLevel = Math.max(unlockedLevel, currentLevel + 1);
        state = "transition";
        transitionTicks = 120;
      } else {
        state = "victory";
        burst(500,300,80,"#ffd54a");
      }
    }

    function clearKeys() {
      Object.keys(keys).forEach(k => keys[k] = false);
    }

    function rects(a,b) {
      return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
    }

    function loseLife() {
      if (state !== "playing" || player.invulnerable > 0) return;
      lives--;
      burst(player.x+player.w/2, player.y+player.h/2, 24, "#ffffff");

      if (lives <= 0) {
        state = "gameover";
        clearKeys();
      } else {
        state = "respawn";
        transitionTicks = 75;
        clearKeys();
      }
    }

    function burst(x,y,count,color) {
      for (let i=0;i<count;i++) {
        const a = Math.random()*Math.PI*2;
        const s = 1+Math.random()*4;
        particles.push({
          x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
          life:30+Math.random()*30,size:2+Math.random()*5,color
        });
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life--;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function updateMovers() {
      for (const m of movers) {
        m.t += m.speed * 0.02;
        if (m.axis === "x") m.x = m.base + Math.sin(m.t)*m.range;
        else m.y = m.base + Math.sin(m.t)*m.range;
      }
    }

    function updatePlayer() {
      if (state !== "playing") return;
      const data = levels[currentLevel];

      const accel = data.slippery ? 0.42 : 0.72;
      const decel = data.slippery ? 0.94 : friction;

      if (keys.ArrowLeft || keys.KeyA) {
        player.vx = Math.max(player.vx-accel, -player.speed);
        player.facing = -1;
      }
      if (keys.ArrowRight || keys.KeyD) {
        player.vx = Math.min(player.vx+accel, player.speed);
        player.facing = 1;
      }
      if (!keys.ArrowLeft && !keys.ArrowRight && !keys.KeyA && !keys.KeyD) {
        player.vx *= decel;
      }

      if ((keys.Space || keys.ArrowUp || keys.KeyW) && player.onGround) {
        player.vy = -player.jump;
        player.onGround = false;
        burst(player.x+player.w/2,player.y+player.h,8,"#ffffff");
      }

      if (data.wind && Math.sin(frame*0.025) > 0.5) {
        player.vx -= 0.035;
      }

      player.vy += gravity;
      const prevBottom = player.y + player.h;

      player.x += player.vx;
      player.y += player.vy;

      player.x = Math.max(0, Math.min(W-player.w, player.x));
      player.onGround = false;

      const allPlatforms = platforms.concat(movers);
      for (const p of allPlatforms) {
        const horizontal = player.x+player.w > p.x && player.x < p.x+p.w;
        const bottom = player.y+player.h;
        if (horizontal && prevBottom <= p.y && bottom >= p.y && player.vy >= 0) {
          player.y = p.y-player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }

      if (player.y > H+90) loseLife();

      for (const h of hazards) {
        if (rects(player,h)) {
          if (h.type === "water") {
            player.vy = -7;
            player.vx *= 0.6;
          } else {
            loseLife();
          }
        }
      }

      if (!banana.collected && rects(player,banana)) {
        banana.collected = true;
        player.hasBanana = true;
        burst(banana.x+20,banana.y+20,35,"#ffd54a");
        messageTicks = 150;
      }

      if (player.hasBanana && rects(player,friend)) {
        player.hasBanana = false;
        completeLevel();
      }

      if (player.invulnerable > 0) player.invulnerable--;
    }

    function patrolEnemy(e) {
      e.phase += 0.04;
      if (e.type === "bird" || e.type === "eagle" || e.type === "bat") {
        e.x += e.speed*e.dir;
        e.y += Math.sin(e.phase)*0.7;
      } else {
        e.x += e.speed*e.dir;
      }
      if (e.x < 10 || e.x > W-e.w-10) e.dir *= -1;
    }

    function chaseEnemy(e) {
      const dx = (player.x+player.w/2)-(e.x+e.w/2);
      const dy = (player.y+player.h/2)-(e.y+e.h/2);
      const d = Math.hypot(dx,dy) || 1;
      e.x += dx/d * e.chaseSpeed;
      e.y += dy/d * e.chaseSpeed * 0.78;
    }

    function updateEnemies() {
      if (state !== "playing") return;

      for (const e of enemies) {
        if (!e.alive) continue;

        if (player.hasBanana) chaseEnemy(e);
        else patrolEnemy(e);

        if (!rects(player,e)) continue;

        if (player.hasBanana) {
          e.x += e.x < player.x ? -8 : 8;
          continue;
        }

        const stomp = player.vy > 0 && player.y+player.h-e.y < 26;
        if (stomp) {
          e.alive = false;
          player.vy = -9;
          burst(e.x+18,e.y+18,18,"#d8b4fe");
        } else {
          loseLife();
          return;
        }
      }
    }

    function updateState() {
      if (state === "transition") {
        transitionTicks--;
        if (transitionTicks <= 0) {
          loadLevel(currentLevel+1);
          state = "playing";
        }
      } else if (state === "respawn") {
        transitionTicks--;
        if (transitionTicks <= 0) restartCurrentLevel();
      }
      if (messageTicks > 0) messageTicks--;
    }

    function roundedRect(x,y,w,h,r,fill,stroke) {
      ctx.beginPath();
      ctx.roundRect(x,y,w,h,r);
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
    }

    function drawBackground(theme) {
      const g = ctx.createLinearGradient(0,0,0,H);
      if (theme === "forest") { g.addColorStop(0,"#69c9ff"); g.addColorStop(1,"#d9f6ff"); }
      if (theme === "jungle") { g.addColorStop(0,"#40b5a8"); g.addColorStop(1,"#d8f7c8"); }
      if (theme === "mountain") { g.addColorStop(0,"#7bb7e8"); g.addColorStop(1,"#eef7ff"); }
      if (theme === "volcano") { g.addColorStop(0,"#301739"); g.addColorStop(1,"#8c2f23"); }
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      if (theme === "forest" || theme === "jungle") {
        ctx.fillStyle = theme === "forest" ? "#7fc97f" : "#2f8f5b";
        for (let i=0;i<7;i++) {
          ctx.beginPath();
          ctx.arc(i*170-20,520,180,Math.PI,Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = theme === "forest" ? "#4f9c62" : "#1f6d45";
        for (let i=0;i<9;i++) {
          ctx.beginPath();
          ctx.arc(i*125,555,110,Math.PI,Math.PI*2);
          ctx.fill();
        }
      }

      if (theme === "mountain") {
        ctx.fillStyle = "rgba(76,110,150,.34)";
        for (let i=0;i<4;i++) {
          const x=i*280-80;
          ctx.beginPath();
          ctx.moveTo(x,520); ctx.lineTo(x+170,210+i*18); ctx.lineTo(x+340,520); ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = "rgba(255,255,255,.65)";
        for (let i=0;i<4;i++) {
          const x=i*280-80;
          ctx.beginPath();
          ctx.moveTo(x+115,310+i*18); ctx.lineTo(x+170,210+i*18); ctx.lineTo(x+225,310+i*18); ctx.closePath(); ctx.fill();
        }
      }

      if (theme === "volcano") {
        ctx.fillStyle = "rgba(255,110,40,.16)";
        for (let i=0;i<22;i++) {
          const x=(i*97+frame*0.5)%W;
          const y=(i*43+frame*1.2)%H;
          ctx.beginPath(); ctx.arc(x,y,2+(i%3),0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "#431d1d";
        ctx.beginPath();
        ctx.moveTo(540,530); ctx.lineTo(780,180); ctx.lineTo(1000,530); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#ff6b35";
        ctx.beginPath(); ctx.ellipse(780,192,45,14,0,0,Math.PI*2); ctx.fill();
      }

      ctx.fillStyle = theme === "volcano" ? "#fbbf24" : "#fff4b8";
      ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.arc(860,85,42,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawDecorItem(d) {
      if (d.type === "tree" || d.type === "pine" || d.type === "palm") {
        ctx.fillStyle = "#6b3f24";
        ctx.fillRect(d.x+16,d.y-55,14,60);
        ctx.fillStyle = d.type === "pine" ? "#2d6a4f" : "#2f8f46";
        if (d.type === "palm") {
          for (let i=0;i<5;i++) {
            ctx.save(); ctx.translate(d.x+23,d.y-55); ctx.rotate((i-2)*0.55);
            ctx.beginPath(); ctx.ellipse(25,0,30,9,0,0,Math.PI*2); ctx.fill(); ctx.restore();
          }
        } else {
          ctx.beginPath(); ctx.arc(d.x+22,d.y-65,30,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(d.x+4,d.y-47,24,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(d.x+43,d.y-45,25,0,Math.PI*2); ctx.fill();
        }
      } else if (d.type === "bush") {
        ctx.fillStyle="#2f8f46";
        ctx.beginPath(); ctx.arc(d.x,d.y,22,0,Math.PI*2); ctx.arc(d.x+25,d.y-4,25,0,Math.PI*2); ctx.arc(d.x+48,d.y,21,0,Math.PI*2); ctx.fill();
      } else if (d.type === "vine") {
        ctx.strokeStyle="#256d3b"; ctx.lineWidth=6;
        ctx.beginPath(); ctx.moveTo(d.x,d.y-100); ctx.bezierCurveTo(d.x-20,d.y-60,d.x+25,d.y-35,d.x,d.y); ctx.stroke();
      } else if (d.type === "waterfall") {
        const g=ctx.createLinearGradient(d.x,d.y-100,d.x+45,d.y);
        g.addColorStop(0,"rgba(255,255,255,.85)"); g.addColorStop(1,"rgba(80,180,255,.75)");
        ctx.fillStyle=g; ctx.fillRect(d.x,d.y-100,40,100);
      } else if (d.type === "snow") {
        ctx.fillStyle="rgba(255,255,255,.85)";
        ctx.beginPath(); ctx.arc(d.x,d.y,20,0,Math.PI*2); ctx.arc(d.x+24,d.y-4,24,0,Math.PI*2); ctx.fill();
      } else if (d.type === "rock") {
        ctx.fillStyle="#4b2c2c"; roundedRect(d.x,d.y-30,55,35,12,"#4b2c2c");
      } else if (d.type === "ember") {
        ctx.fillStyle="#ff8a2b";
        ctx.beginPath(); ctx.arc(d.x,d.y-15+Math.sin(frame*.08)*5,5,0,Math.PI*2); ctx.fill();
      } else if (d.type === "flower") {
        ctx.fillStyle="#ff6fae";
        for (let i=0;i<5;i++) {
          const a=i*Math.PI*2/5;
          ctx.beginPath(); ctx.arc(d.x+Math.cos(a)*8,d.y+Math.sin(a)*8,6,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle="#ffd54a"; ctx.beginPath(); ctx.arc(d.x,d.y,5,0,Math.PI*2); ctx.fill();
      }
    }

    function drawPlatforms(theme) {
      const top = theme === "mountain" ? "#f6fbff" : theme === "volcano" ? "#2b1b1b" : "#56b84f";
      const side = theme === "mountain" ? "#758da5" : theme === "volcano" ? "#5a2f28" : "#7b4b2b";

      for (const p of platforms.concat(movers)) {
        roundedRect(p.x,p.y,p.w,p.h,8,side);
        ctx.fillStyle=top;
        ctx.fillRect(p.x,p.y,p.w,8);
        ctx.fillStyle="rgba(255,255,255,.12)";
        ctx.fillRect(p.x+5,p.y+10,Math.max(0,p.w-10),3);
      }
    }

    function drawHazards() {
      for (const h of hazards) {
        if (h.type === "spikes") {
          ctx.fillStyle="#dbeafe";
          for (let x=h.x;x<h.x+h.w;x+=15) {
            ctx.beginPath(); ctx.moveTo(x,h.y+h.h); ctx.lineTo(x+7,h.y); ctx.lineTo(x+14,h.y+h.h); ctx.closePath(); ctx.fill();
          }
        } else if (h.type === "lava") {
          ctx.fillStyle="#ff6b20"; roundedRect(h.x,h.y,h.w,h.h,7,"#ff6b20");
          ctx.fillStyle="#ffd166";
          for (let x=h.x+8;x<h.x+h.w;x+=18) {
            ctx.beginPath(); ctx.arc(x,h.y+8+Math.sin(frame*.1+x)*3,4,0,Math.PI*2); ctx.fill();
          }
        } else {
          ctx.fillStyle="#47b8e0"; roundedRect(h.x,h.y,h.w,h.h,7,"#47b8e0");
        }
      }
    }

    function drawPerson(x,y,shirt,hair,isFriend=false) {
      ctx.save();
      ctx.translate(x,y);
      ctx.fillStyle="rgba(0,0,0,.18)";
      ctx.beginPath(); ctx.ellipse(18,64,20,6,0,0,Math.PI*2); ctx.fill();

      ctx.fillStyle="#f0bd86";
      ctx.beginPath(); ctx.arc(18,15,14,0,Math.PI*2); ctx.fill();

      ctx.fillStyle=hair;
      ctx.beginPath(); ctx.arc(18,11,14,Math.PI,Math.PI*2); ctx.fill();
      ctx.fillRect(5,9,4,9);

      ctx.fillStyle=shirt;
      roundedRect(5,28,26,26,7,shirt);

      ctx.fillStyle="#263238";
      ctx.fillRect(7,51,8,14);
      ctx.fillRect(21,51,8,14);

      ctx.fillStyle="#111827";
      ctx.beginPath(); ctx.arc(13,15,2,0,Math.PI*2); ctx.arc(23,15,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#7c3f22"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(18,20,5,0.1,Math.PI-0.1); ctx.stroke();

      if (isFriend) {
        ctx.fillStyle="#fff";
        roundedRect(-70,-45,165,30,10,"rgba(255,255,255,.92)");
        ctx.fillStyle="#111827";
        ctx.font="15px Arial";
        ctx.fillText(player.hasBanana ? "You found it!" : "Bring me the banana!",-60,-25);
      }
      ctx.restore();
    }

    function drawPlayer() {
      if (player.invulnerable>0 && Math.floor(player.invulnerable/5)%2===0) return;
      drawPerson(player.x,player.y,"#2185d0","#5c321b");
      if (player.hasBanana) drawBanana(player.x-2,player.y-34,true);
    }

    function drawBanana(x,y,small=false) {
      ctx.save();
      const scale=small?0.75:1;
      ctx.translate(x,y+Math.sin(frame*.08)*3);
      ctx.scale(scale,scale);
      ctx.shadowColor="#ffd54a";
      ctx.shadowBlur=18;
      ctx.strokeStyle="#ffd54a";
      ctx.lineWidth=9;
      ctx.beginPath(); ctx.arc(20,15,20,.15,Math.PI-.2); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle="#5f3a1d"; ctx.fillRect(35,16,5,7);
      ctx.restore();
    }

    function enemyColor(type) {
      return {
        slime:"#8b5cf6", thief:"#f97316", monkey:"#8b5a2b", snake:"#10b981",
        bird:"#ef4444", goat:"#a3a3a3", ice:"#60a5fa", eagle:"#92400e",
        yeti:"#e5e7eb", fire:"#f97316", bat:"#7c3aed", magma:"#dc2626", golem:"#6b3f2e"
      }[type] || "#8b5cf6";
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x,e.y+Math.sin(frame*.08+e.phase)*2);
      ctx.fillStyle="rgba(0,0,0,.18)";
      ctx.beginPath(); ctx.ellipse(18,38,19,5,0,0,Math.PI*2); ctx.fill();

      roundedRect(0,0,e.w,e.h,12,enemyColor(e.type));

      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(11,13,5,0,Math.PI*2); ctx.arc(25,13,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#111";
      ctx.beginPath(); ctx.arc(12,14,2,0,Math.PI*2); ctx.arc(26,14,2,0,Math.PI*2); ctx.fill();

      if (player.hasBanana) {
        ctx.fillStyle="#fff";
        ctx.font="bold 20px Arial";
        ctx.fillText("!",14,-8);
      }
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha=Math.max(0,p.life/60);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
    }

    function drawHUD() {
      roundedRect(14,14,355,68,16,"rgba(15,23,42,.72)");
      ctx.fillStyle="#fff";
      ctx.font="bold 22px Arial";
      ctx.fillText(`${levels[currentLevel].icon} Level ${currentLevel}: ${levels[currentLevel].name}`,28,41);
      ctx.font="16px Arial";
      ctx.fillStyle="#dbeafe";
      ctx.fillText(player.hasBanana ? "Return the banana to your friend!" : "Find the banana.",28,66);

      roundedRect(790,14,195,68,16,"rgba(15,23,42,.72)");
      ctx.fillStyle="#fff";
      ctx.font="bold 20px Arial";
      ctx.fillText("Lives",810,42);
      ctx.font="27px Arial";
      ctx.fillText("❤️".repeat(Math.max(0,lives)),870,47);

      if (player.hasBanana && messageTicks>0) {
        roundedRect(215,95,570,48,16,"rgba(127,29,29,.86)");
        ctx.fillStyle="#fff";
        ctx.font="bold 19px Arial";
        ctx.textAlign="center";
        ctx.fillText("All enemies are chasing you — but they cannot hurt you!",500,126);
        ctx.textAlign="left";
      }
    }

    function panel(title, lines, buttonText, accent="#fbbf24") {
      ctx.fillStyle="rgba(4,10,20,.55)";
      ctx.fillRect(0,0,W,H);
      roundedRect(205,115,590,370,24,"rgba(255,255,255,.94)");
      ctx.textAlign="center";
      ctx.fillStyle="#172033";
      ctx.font="bold 50px Arial";
      ctx.fillText(title,500,195);
      ctx.font="22px Arial";
      let y=255;
      for (const line of lines) {
        ctx.fillText(line,500,y);
        y+=38;
      }
      roundedRect(315,400,370,58,16,accent);
      ctx.fillStyle="#1f2937";
      ctx.font="bold 24px Arial";
      ctx.fillText(buttonText,500,437);
      ctx.textAlign="left";
    }

    function drawScene() {
      const theme=levels[currentLevel].theme;
      drawBackground(theme);
      decor.forEach(drawDecorItem);
      drawPlatforms(theme);
      drawHazards();

      if (!banana.collected) drawBanana(banana.x,banana.y);
      drawPerson(friend.x,friend.y,currentLevel===4?"#f59e0b":"#ef4444","#2b1a12",true);

      enemies.filter(e=>e.alive).forEach(drawEnemy);
      drawPlayer();
      drawParticles();
      drawHUD();
    }

    function draw() {
      ctx.clearRect(0,0,W,H);

      if (state==="title") {
        currentLevel=1;
        drawBackground("forest");
        panel("BANANA QUEST",[
          "Four worlds. One heroic banana delivery.",
          "Move: Arrow Keys / A-D",
          "Jump: Space / Up / W"
        ],"Press ENTER or Tap Start");
        return;
      }

      drawScene();

      if (state==="transition") {
        panel(`LEVEL ${currentLevel} COMPLETE!`,[
          `Next: ${levels[currentLevel+1].icon} ${levels[currentLevel+1].name}`,
          `Lives remaining: ${lives}`
        ],"Loading next level...");
      } else if (state==="respawn") {
        panel("TRY AGAIN",[
          `Respawning in Level ${currentLevel}`,
          `${levels[currentLevel].icon} ${levels[currentLevel].name}`,
          `Lives remaining: ${lives}`
        ],"Checkpoint: Current Level","#93c5fd");
      } else if (state==="gameover") {
        panel("GAME OVER",[
          `You reached Level ${currentLevel}.`,
          "Your lives have run out."
        ],"Press ENTER or Tap Start","#fb7185");
      } else if (state==="victory") {
        panel("QUEST COMPLETE!",[
          "You conquered Forest, Jungle, Mountain, and Volcano.",
          "The banana has been delivered safely.",
          "Banana Master has been defeated!"
        ],"Press ENTER to Play Again","#86efac");
      }
    }

    function loop() {
      frame++;
      updateMovers();
      updatePlayer();
      updateEnemies();
      updateParticles();
      updateState();
      draw();
      requestAnimationFrame(loop);
    }

    function startAction() {
      if (state==="title" || state==="gameover" || state==="victory") startGame();
    }

    window.addEventListener("keydown", e => {
      keys[e.code]=true;
      if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
      if (e.code==="Enter") startAction();
    });

    window.addEventListener("keyup", e => keys[e.code]=false);
    window.addEventListener("blur",clearKeys);

    canvas.addEventListener("click",startAction);
    canvas.addEventListener("touchstart",e=>{ e.preventDefault(); startAction(); },{passive:false});

    document.querySelectorAll("button").forEach(btn => {
      const key=btn.dataset.key;
      const down=e=>{
        e.preventDefault();
        if (key==="Enter") startAction();
        else keys[key]=true;
      };
      const up=e=>{
        e.preventDefault();
        keys[key]=false;
      };
      btn.addEventListener("mousedown",down);
      btn.addEventListener("mouseup",up);
      btn.addEventListener("mouseleave",up);
      btn.addEventListener("touchstart",down,{passive:false});
      btn.addEventListener("touchend",up,{passive:false});
      btn.addEventListener("touchcancel",up,{passive:false});
    });

    loadLevel(1);
    loop();
  })();
</script>
</body>
</html>
